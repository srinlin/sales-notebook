<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="영업수첩">
<title>영업수첩 · 슈어소프트테크</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeede9;
  --text:#1a1a18;--text2:#6b6b67;--text3:#a09f9b;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --accent:#0F6E56;--radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2e2e2b;
    --text:#f0efe9;--text2:#a09f9b;--text3:#6b6b67;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --accent:#1D9E75;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:15px}
.shell{max-width:480px;margin:0 auto;background:var(--bg3);min-height:100vh;padding-bottom:88px}
.top{background:var(--bg);border-bottom:0.5px solid var(--border);padding:16px 20px 14px;position:sticky;top:0;z-index:10}
.top-row{display:flex;justify-content:space-between;align-items:flex-start}
.top h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.top h1 i{color:var(--accent)}
.top p{font-size:12px;color:var(--text3);margin-top:2px}
.sync-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:2px;display:flex;align-items:center}
.sync-btn:active{color:var(--accent)}
.sync-btn.spinning i{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sync-status{font-size:11px;color:var(--text3);margin-top:3px;text-align:right}
.sync-status.ok{color:var(--accent)}
.sync-status.err{color:#E24B4A}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 10px}
.stat{background:var(--bg);border-radius:var(--radius-lg);padding:14px 16px;border:0.5px solid var(--border)}
.stat-lbl{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.stat-val{font-size:22px;font-weight:600}
.stat-sub{font-size:12px;color:var(--text2);margin-top:2px}
.tabs-wrap{padding:0 16px 10px}
.tabs{display:flex;background:var(--bg2);border-radius:var(--radius);padding:3px;gap:2px}
.tab{flex:1;padding:8px;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;transition:all .15s}
.tab.on{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.search-wrap{padding:0 16px 10px}
.sbox{display:flex;align-items:center;gap:8px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px}
.sbox i{color:var(--text3);font-size:16px}
.sbox input{flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--text)}
.sbox input::placeholder{color:var(--text3)}
.list{padding:0 16px}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:10px}
.empty p{font-size:14px}
.loading{text-align:center;padding:48px 20px;color:var(--text3)}
.loading i{font-size:32px;display:block;margin-bottom:10px;animation:spin 1s linear infinite}
.card{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:16px;margin-bottom:10px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.c-title{font-size:15px;font-weight:600;line-height:1.3}
.c-client{font-size:12px;color:var(--text2);margin-top:3px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-contacted{background:#E6F1FB;color:#0C447C}
.b-quote{background:#FAEEDA;color:#633806}
.b-nego{background:#EEEDFE;color:#3C3489}
.b-done{background:#EAF3DE;color:#27500A}
.b-revenue{background:#9FE1CB;color:#085041}
.b-lost{background:#F7C1C1;color:#791F1F}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ii .lbl{font-size:10px;color:var(--text3);margin-bottom:2px;font-weight:500}
.ii .val{font-size:12px;font-weight:500;line-height:1.5}
.inv-box{background:var(--bg2);border-radius:8px;padding:8px 10px;margin-top:8px}
.inv-box-title{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:6px}
.inv-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px}
.inv-row .k{color:var(--text2)}
.inv-row .v{font-weight:500}
.issued{color:#0F6E56;font-weight:600}
.pending{color:var(--text3)}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tag{font-size:10px;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border);border-radius:20px;padding:3px 8px;font-weight:500}
.memo{font-size:11px;color:var(--text2);margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);line-height:1.5}
.card-acts{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)}
.btn-act{flex:1;font-size:12px;padding:7px;border:0.5px solid var(--border2);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-weight:500}
.btn-act:active{background:var(--bg2)}
.fab{position:fixed;bottom:24px;right:50%;transform:translateX(50%);max-width:480px;width:calc(100% - 32px);background:var(--accent);color:#fff;border:none;border-radius:var(--radius-lg);padding:14px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(15,110,86,.35);z-index:20}
.fab:active{opacity:.85;transform:translateX(50%) scale(.98)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:20px 20px 48px;-webkit-overflow-scrolling:touch}
.m-handle{width:40px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 18px}
.m-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.m-head h2{font-size:17px;font-weight:600}
.m-close{background:var(--bg2);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:16px}
.fsec{margin-bottom:20px}
.slbl{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.fg{margin-bottom:12px}
.flbl{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.fi{width:100%;padding:10px 12px;font-size:14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit}
.fi:focus{outline:none;border-color:var(--accent)}
textarea.fi{resize:none;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{font-size:12px;padding:6px 12px;border:0.5px solid var(--border2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-weight:500;font-family:inherit;transition:all .12s}
.pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.pill.on-blue{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.inv-sec{background:var(--bg2);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.inv-sec-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px}
.trow{display:flex;align-items:center;gap:10px;margin-top:6px}
.tsw{width:40px;height:22px;background:var(--border2);border-radius:20px;cursor:pointer;position:relative;transition:background .2s;border:none;flex-shrink:0}
.tsw.on{background:var(--accent)}
.tsw::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s}
.tsw.on::after{left:20px}
.tlbl{font-size:13px;color:var(--text2)}
.divider{height:.5px;background:var(--border);margin:20px 0}
.btn-save{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-save:active{opacity:.85}
.btn-del{width:100%;background:transparent;color:#E24B4A;border:0.5px solid #E24B4A;border-radius:var(--radius);padding:12px;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-del:active{background:#FCEBEB}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="top-row">
      <div>
        <h1><i class="ti ti-briefcase"></i>영업 수첩</h1>
        <p>슈어소프트테크 · AX사업개발2팀</p>
      </div>
      <div style="text-align:right">
        <button class="sync-btn" id="sync-btn" onclick="syncNow()" title="동기화"><i class="ti ti-refresh"></i></button>
        <div class="sync-status" id="sync-status">동기화 중...</div>
      </div>
    </div>
  </div>
  <div class="summary">
    <div class="stat"><div class="stat-lbl">계약 완료</div><div class="stat-val" id="s-done">0건</div><div class="stat-sub" id="s-done-amt">-</div></div>
    <div class="stat"><div class="stat-lbl">영업 중</div><div class="stat-val" id="s-active">0건</div><div class="stat-sub" id="s-active-amt">-</div></div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab on" onclick="switchTab('active')">영업 중</button>
      <button class="tab" onclick="switchTab('done')">계약 완료</button>
      <button class="tab" onclick="switchTab('lost')">낙주</button>
    </div>
  </div>
  <div class="search-wrap">
    <div class="sbox">
      <i class="ti ti-search"></i>
      <input type="text" id="search-input" placeholder="고객사, 사업명, 제품 검색..." oninput="render()">
    </div>
  </div>
  <div class="list" id="list"></div>
</div>

<button class="fab" onclick="openModal(null)"><i class="ti ti-plus"></i> 새 거래 추가</button>

<div class="overlay" id="overlay" onclick="bgClick(event)">
  <div class="modal" id="modal">
    <div class="m-handle"></div>
    <div class="m-head">
      <h2 id="m-title">새 거래 추가</h2>
      <button class="m-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>

    <div class="fsec">
      <div class="slbl">기본 정보</div>
      <div class="fg"><label class="flbl">고객사 *</label><input class="fi" id="f-client" placeholder="예: 풍산, 블루텍, 유콘시스템"></div>
      <div class="fg"><label class="flbl">담당자</label><input class="fi" id="f-contact" placeholder="이름 · 직급"></div>
      <div class="fg"><label class="flbl">사업명 *</label><input class="fi" id="f-name" placeholder="사업 명칭"></div>
      <div class="frow">
        <div class="fg"><label class="flbl">사업기간 시작</label><input class="fi" id="f-start" type="date"></div>
        <div class="fg"><label class="flbl">사업기간 종료</label><input class="fi" id="f-end" type="date"></div>
      </div>
    </div>

    <div class="fsec">
      <div class="slbl">금액</div>
      <div class="fg">
        <label class="flbl">계약금액 (원, VAT별도) <span id="auto-calc-hint" style="color:var(--accent);font-size:11px"></span></label>
        <input class="fi" id="f-amount" type="text" inputmode="numeric" placeholder="예: 5,000,000" oninput="fmtInput(this);calcAmount()">
      </div>
      <div class="inv-sec">
        <div class="inv-sec-title">선금</div>
        <div class="frow" style="margin-bottom:0">
          <div class="fg" style="margin-bottom:0"><label class="flbl">금액</label><input class="fi" id="f-down" type="text" inputmode="numeric" placeholder="원" oninput="fmtInput(this);calcAmount()"></div>
          <div class="fg" style="margin-bottom:0"><label class="flbl">입금 일시</label><input class="fi" id="f-down-date" type="date"></div>
        </div>
        <div class="trow">
          <button class="tsw" id="tsw-down" onclick="toggleInv('down')"></button>
          <span class="tlbl" id="tlbl-down">세금계산서 미발행</span>
        </div>
        <input class="fi" id="f-inv-down-date" type="date" style="display:none;margin-top:8px">
      </div>
      <div class="inv-sec">
        <div class="inv-sec-title">잔금</div>
        <div class="frow" style="margin-bottom:0">
          <div class="fg" style="margin-bottom:0"><label class="flbl">금액</label><input class="fi" id="f-balance" type="text" inputmode="numeric" placeholder="원" oninput="fmtInput(this);calcAmount()"></div>
          <div class="fg" style="margin-bottom:0"><label class="flbl">입금 일시</label><input class="fi" id="f-balance-date" type="date"></div>
        </div>
        <div class="trow">
          <button class="tsw" id="tsw-balance" onclick="toggleInv('balance')"></button>
          <span class="tlbl" id="tlbl-balance">세금계산서 미발행</span>
        </div>
        <input class="fi" id="f-inv-balance-date" type="date" style="display:none;margin-top:8px">
      </div>
    </div>

    <div class="fsec">
      <div class="slbl">영업 단계</div>
      <div class="pills" id="g-stage">
        <button class="pill" data-v="contacted" onclick="selPill(this,'g-stage')">최초 컨택</button>
        <button class="pill" data-v="quote" onclick="selPill(this,'g-stage')">견적 제출</button>
        <button class="pill" data-v="nego" onclick="selPill(this,'g-stage')">협상 중</button>
        <button class="pill" data-v="done" onclick="selPill(this,'g-stage')">계약 완료</button>
        <button class="pill" data-v="revenue" onclick="selPill(this,'g-stage')">매출 완료</button>
        <button class="pill" data-v="lost" onclick="selPill(this,'g-stage')">낙주</button>
      </div>
    </div>

    <div class="fsec">
      <div class="slbl">사업 구분</div>
      <div class="pills" id="g-type">
        <button class="pill" data-v="service" onclick="selPill(this,'g-type')">기술용역</button>
        <button class="pill" data-v="tool" onclick="selPill(this,'g-type')">도구</button>
        <button class="pill" data-v="both" onclick="selPill(this,'g-type')">도구+기술용역</button>
      </div>
    </div>

    <div class="fsec">
      <div class="slbl">제품명</div>
      <div class="pills" id="g-product">
        <button class="pill" data-v="STATIC" onclick="multi(this)">STATIC</button>
        <button class="pill" data-v="COVER" onclick="multi(this)">COVER</button>
        <button class="pill" data-v="CT" onclick="multi(this)">CT</button>
        <button class="pill" data-v="VPES" onclick="multi(this)">VPES</button>
        <button class="pill" data-v="STATIC+" onclick="multi(this)">STATIC+</button>
        <button class="pill" data-v="COVER+" onclick="multi(this)">COVER+</button>
        <button class="pill" data-v="COVER타겟" onclick="multi(this)">COVER타겟</button>
        <button class="pill" data-v="SW신뢰성시험 용역" onclick="multi(this)">SW신뢰성시험 용역</button>
        <button class="pill" data-v="도구 유지보수" onclick="multi(this)">도구 유지보수</button>
      </div>
      <input class="fi" id="f-product-other" placeholder="기타 제품 직접 입력" style="margin-top:8px">
    </div>

    <div class="fsec">
      <div class="slbl">메모</div>
      <textarea class="fi" id="f-memo" rows="3" placeholder="특이사항, 경쟁사, 진행 상황 등"></textarea>
    </div>

    <div class="divider"></div>
    <button class="btn-save" onclick="saveDeal()" id="btn-save">저장</button>
    <button class="btn-del" id="btn-del" style="display:none" onclick="deleteDeal()"><i class="ti ti-trash"></i> 거래 삭제</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzZwB1KcvV5Yc4lywRebMDnaPID84yStWZtJ9qgPft6BK2BdzyAVs8Y40GWimvv1v2row/exec';
const SMAP={contacted:'최초 컨택',quote:'견적 제출',nego:'협상 중',done:'계약 완료',revenue:'매출 완료',lost:'낙주'};
const SBADGE={contacted:'b-contacted',quote:'b-quote',nego:'b-nego',done:'b-done',revenue:'b-revenue',lost:'b-lost'};
const TMAP={service:'기술용역',tool:'도구',both:'도구+기술용역'};

let deals=[], tab='active', editId=null, invDown=false, invBalance=false;

/* ── 동기화 ── */
async function syncNow(){
  setSyncUI('loading');
  try{
    const res=await fetch(API);
    const data=await res.json();
    deals=data;
    localStorage.setItem('sureSoft_v3',JSON.stringify(deals));
    setSyncUI('ok');
    upd(); render();
  }catch(e){
    setSyncUI('err');
    toast('동기화 실패 — 오프라인 데이터로 표시 중');
  }
}

function setSyncUI(state){
  const btn=document.getElementById('sync-btn');
  const lbl=document.getElementById('sync-status');
  if(state==='loading'){
    btn.classList.add('spinning');
    lbl.textContent='동기화 중...'; lbl.className='sync-status';
  } else if(state==='ok'){
    btn.classList.remove('spinning');
    const now=new Date();
    lbl.textContent=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 업데이트`;
    lbl.className='sync-status ok';
  } else {
    btn.classList.remove('spinning');
    lbl.textContent='동기화 실패'; lbl.className='sync-status err';
  }
}

async function pushDeal(action, deal){
  try{
    await fetch(API,{
      method:'POST',
      body:JSON.stringify({action, deal}),
    });
  }catch(e){ toast('서버 저장 실패 — 로컬에만 저장됨'); }
}

/* ── 로컬 캐시 로드 ── */
function loadLocal(){
  try{
    const keys=['sureSoft_v3','sureSoft_deals_v2','sureSoft_deals'];
    let raw=null;
    for(const k of keys){raw=localStorage.getItem(k);if(raw)break;}
    if(raw) deals=JSON.parse(raw);
  }catch(e){deals=[];}
  upd(); render();
}

/* ── 포맷 ── */
function fmtInput(el){
  const raw=el.value.replace(/[^0-9]/g,'');
  el.value=raw?parseInt(raw).toLocaleString():'';
}
function stripComma(v){return String(v||'').replace(/,/g,'');}
function calcAmount(){
  const a=parseInt(stripComma(document.getElementById('f-amount').value))||0;
  const d=parseInt(stripComma(document.getElementById('f-down').value))||0;
  const b=parseInt(stripComma(document.getElementById('f-balance').value))||0;
  const hint=document.getElementById('auto-calc-hint');
  if(a===0&&d>0&&b>0){
    document.getElementById('f-amount').value=(d+b).toLocaleString();
    hint.textContent='← 선금+잔금 자동계산';
  } else if(a>0&&d>0&&b===0){
    const bal=a-d; document.getElementById('f-balance').value=bal>0?bal.toLocaleString():'0';
    hint.textContent=bal>0?'잔금 자동계산':'';
  } else if(a>0&&d===0&&b>0){
    const dn=a-b; document.getElementById('f-down').value=dn>0?dn.toLocaleString():'0';
    hint.textContent=dn>0?'선금 자동계산':'';
  } else { hint.textContent=''; }
}
function fmt(n){
  if(!n||n==0)return'-';
  const x=parseInt(n);
  const comma=x.toLocaleString()+'원';
  if(x>=100000000) return (x/100000000).toFixed(1).replace(/\.0$/,'')+'억 ('+comma+') VAT별도';
  if(x>=10000000)  return Math.round(x/10000000)+'천만 ('+comma+') VAT별도';
  return comma+' VAT별도';
}
function total(arr){
  const t=arr.reduce((s,d)=>s+(parseInt(d.amount)||0),0);
  return t?fmt(t):'-';
}

/* ── 상태 ── */
function upd(){
  const done=deals.filter(d=>d.stage==='done'||d.stage==='revenue');
  const active=deals.filter(d=>d.stage!=='done'&&d.stage!=='revenue'&&d.stage!=='lost');
  document.getElementById('s-done').textContent=done.length+'건';
  document.getElementById('s-done-amt').textContent=total(done);
  document.getElementById('s-active').textContent=active.length+'건';
  document.getElementById('s-active-amt').textContent=total(active);
}

function switchTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',(i===0&&t==='active')||(i===1&&t==='done')||(i===2&&t==='lost')));
  render();
}

function render(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  let list=tab==='done'
    ?deals.filter(d=>d.stage==='done'||d.stage==='revenue')
    :tab==='lost'
    ?deals.filter(d=>d.stage==='lost')
    :deals.filter(d=>d.stage!=='done'&&d.stage!=='revenue'&&d.stage!=='lost');
  if(q)list=list.filter(d=>[d.client,d.name,d.contact,...(d.products||[]),d.productOther||''].join(' ').toLowerCase().includes(q));

  const c=document.getElementById('list');
  if(!list.length){
    c.innerHTML='<div class="empty"><i class="ti ti-inbox"></i><p>'+(q?'검색 결과가 없어요':'아직 추가된 거래가 없어요')+'</p></div>';
    return;
  }
  c.innerHTML=list.map(d=>{
    const prods=[...(d.products||[]),d.productOther||''].filter(Boolean);
    const dInv=d.invDown?'<span class="issued">발행</span>'+(d.invDownDate?' <span style="color:var(--text3);font-size:10px;font-weight:400">'+d.invDownDate+'</span>':''):'<span class="pending">미발행</span>';
    const bInv=d.invBalance?'<span class="issued">발행</span>'+(d.invBalanceDate?' <span style="color:var(--text3);font-size:10px;font-weight:400">'+d.invBalanceDate+'</span>':''):'<span class="pending">미발행</span>';
    return '<div class="card">'
      +'<div class="card-top"><div style="flex:1;min-width:0;padding-right:10px">'
      +'<div class="c-title">'+esc(d.name||'(사업명 없음)')+'</div>'
      +'<div class="c-client">'+esc(d.client||'')+(d.contact?' · '+esc(d.contact):'')+'</div>'
      +'</div><span class="badge '+(SBADGE[d.stage]||'b-contacted')+'">'+(SMAP[d.stage]||d.stage)+'</span></div>'
      +'<div class="cgrid">'
      +'<div class="ii"><div class="lbl">계약금액</div><div class="val">'+fmt(d.amount)+'</div></div>'
      +'<div class="ii"><div class="lbl">사업기간</div><div class="val">'+(d.start||'-')+(d.end?'<br>~ '+d.end:'')+'</div></div>'
      +'<div class="ii"><div class="lbl">선금</div><div class="val">'+fmt(d.down)+(d.downDate?'<br><span style="font-weight:400;color:var(--text3);font-size:10px">'+d.downDate+'</span>':'')+'</div></div>'
      +'<div class="ii"><div class="lbl">잔금</div><div class="val">'+fmt(d.balance)+(d.balanceDate?'<br><span style="font-weight:400;color:var(--text3);font-size:10px">'+d.balanceDate+'</span>':'')+'</div></div>'
      +'<div class="ii"><div class="lbl">사업구분</div><div class="val">'+(TMAP[d.type]||'-')+'</div></div>'
      +'</div>'
      +'<div class="inv-box"><div class="inv-box-title">세금계산서</div>'
      +'<div class="inv-row"><span class="k">선금</span><span class="v">'+dInv+'</span></div>'
      +'<div class="inv-row"><span class="k">잔금</span><span class="v">'+bInv+'</span></div></div>'
      +(prods.length?'<div class="tags">'+prods.map(p=>'<span class="tag">'+esc(p)+'</span>').join('')+'</div>':'')
      +(d.memo?'<div class="memo">'+esc(d.memo)+'</div>':'')
      +'<div class="card-acts">'
      +'<button class="btn-act" onclick="openModal(\''+d.id+'\')"><i class="ti ti-edit"></i> 수정</button>'
      +'<button class="btn-act" onclick="copyDeal(\''+d.id+'\')"><i class="ti ti-copy"></i> 복사</button>'
      +'</div></div>';
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── 모달 ── */
function openModal(id){
  editId=id; invDown=false; invBalance=false;
  document.getElementById('m-title').textContent=id?'거래 수정':'새 거래 추가';
  document.getElementById('btn-del').style.display=id?'flex':'none';
  document.getElementById('btn-save').textContent=id?'수정 저장':'저장';
  ['f-client','f-contact','f-name','f-start','f-end','f-amount',
   'f-down','f-down-date','f-balance','f-balance-date',
   'f-inv-down-date','f-inv-balance-date','f-memo','f-product-other']
    .forEach(x=>document.getElementById(x).value='');
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('on','on-blue'));
  const hint=document.getElementById('auto-calc-hint');if(hint)hint.textContent='';

  if(id){
    const d=deals.find(x=>x.id===id);
    if(d){
      const m={client:'f-client',contact:'f-contact',name:'f-name',start:'f-start',end:'f-end',
               amount:'f-amount',down:'f-down',downDate:'f-down-date',
               balance:'f-balance',balanceDate:'f-balance-date',
               invDownDate:'f-inv-down-date',invBalanceDate:'f-inv-balance-date',
               memo:'f-memo',productOther:'f-product-other'};
      Object.entries(m).forEach(([k,el])=>{if(d[k])document.getElementById(el).value=d[k];});
      ['f-amount','f-down','f-balance'].forEach(id=>{
        const el=document.getElementById(id);
        if(el.value)el.value=parseInt(el.value).toLocaleString();
      });
      if(d.stage){const b=document.querySelector('#g-stage [data-v="'+d.stage+'"]');if(b)b.classList.add('on');}
      if(d.type){const b=document.querySelector('#g-type [data-v="'+d.type+'"]');if(b)b.classList.add('on');}
      (d.products||[]).forEach(p=>{const b=document.querySelector('#g-product [data-v="'+p+'"]');if(b)b.classList.add('on-blue');});
      invDown=!!d.invDown; invBalance=!!d.invBalance;
    }
  }
  syncInv('down'); syncInv('balance');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal').scrollTop=0;
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow=''; editId=null;
}
function bgClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
function toggleInv(t){if(t==='down')invDown=!invDown;else invBalance=!invBalance;syncInv(t);}
function syncInv(t){
  const on=t==='down'?invDown:invBalance;
  document.getElementById('tsw-'+t).className='tsw'+(on?' on':'');
  document.getElementById('tlbl-'+t).textContent='세금계산서 '+(on?'발행':'미발행');
  document.getElementById('f-inv-'+t+'-date').style.display=on?'block':'none';
}
function selPill(el,g){
  document.querySelectorAll('#'+g+' .pill').forEach(b=>b.classList.remove('on','on-blue'));
  el.classList.add('on');
}
function multi(el){el.classList.toggle('on-blue');el.classList.remove('on');}

/* ── 저장/삭제 ── */
async function saveDeal(){
  const client=document.getElementById('f-client').value.trim();
  const name=document.getElementById('f-name').value.trim();
  if(!client||!name){toast('고객사와 사업명은 필수예요');return;}
  document.getElementById('btn-save').textContent='저장 중...';
  document.getElementById('btn-save').disabled=true;

  const sb=document.querySelector('#g-stage .pill.on');
  const tb=document.querySelector('#g-type .pill.on');
  const prods=[...document.querySelectorAll('#g-product .pill.on-blue')].map(b=>b.dataset.v);
  const d={
    id:editId||Date.now().toString(),
    client,name,
    contact:document.getElementById('f-contact').value.trim(),
    start:document.getElementById('f-start').value,
    end:document.getElementById('f-end').value,
    amount:stripComma(document.getElementById('f-amount').value),
    down:stripComma(document.getElementById('f-down').value),
    downDate:document.getElementById('f-down-date').value,
    balance:stripComma(document.getElementById('f-balance').value),
    balanceDate:document.getElementById('f-balance-date').value,
    invDown,invDownDate:document.getElementById('f-inv-down-date').value,
    invBalance,invBalanceDate:document.getElementById('f-inv-balance-date').value,
    stage:sb?sb.dataset.v:'contacted',
    type:tb?tb.dataset.v:'',
    products:prods,
    productOther:document.getElementById('f-product-other').value.trim(),
    memo:document.getElementById('f-memo').value.trim(),
  };

  if(editId) deals=deals.map(x=>x.id===editId?d:x); else deals.push(d);
  localStorage.setItem('sureSoft_v3',JSON.stringify(deals));
  upd(); render(); closeModal();
  toast(editId?'수정됐어요 · 서버 저장 중...':'추가됐어요 · 서버 저장 중...');

  await pushDeal('save', d);
  toast(editId?'수정 완료':'저장 완료');

  document.getElementById('btn-save').textContent=editId?'수정 저장':'저장';
  document.getElementById('btn-save').disabled=false;
}

async function deleteDeal(){
  if(!confirm('정말 삭제할까요?'))return;
  const d=deals.find(x=>x.id===editId);
  deals=deals.filter(x=>x.id!==editId);
  localStorage.setItem('sureSoft_v3',JSON.stringify(deals));
  upd(); render(); closeModal(); toast('삭제됐어요 · 서버 반영 중...');
  await pushDeal('delete', d);
  toast('삭제 완료');
}

/* ── 복사 ── */
function copyDeal(id){
  const d=deals.find(x=>x.id===id);if(!d)return;
  const prods=[...(d.products||[]),d.productOther||''].filter(Boolean);
  const lines=[
    '📋 '+d.name,
    '🏢 '+d.client+(d.contact?' · '+d.contact:''),
    '📅 '+(d.start||'')+(d.end?' ~ '+d.end:''),
    '💰 계약금액: '+fmt(d.amount),
    d.down?'   선금: '+fmt(d.down)+(d.downDate?' ('+d.downDate+')')+'  세금계산서: '+(d.invDown?'발행'+(d.invDownDate?' '+d.invDownDate:''):'미발행'):'',
    d.balance?'   잔금: '+fmt(d.balance)+(d.balanceDate?' ('+d.balanceDate+')')+'  세금계산서: '+(d.invBalance?'발행'+(d.invBalanceDate?' '+d.invBalanceDate:''):'미발행'):'',
    '📊 영업단계: '+(SMAP[d.stage]||d.stage),
    '🔧 사업구분: '+(TMAP[d.type]||'-'),
    prods.length?'📦 제품: '+prods.join(', '):'',
    d.memo?'📝 '+d.memo:''
  ].filter(Boolean).join('\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(lines).then(()=>toast('클립보드에 복사됐어요'));
  }else{
    const ta=document.createElement('textarea');
    ta.value=lines;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    toast('클립보드에 복사됐어요');
  }
}

let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── 시작 ── */
loadLocal();
syncNow();
</script>
